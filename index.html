<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0e18" />
    <meta name="color-scheme" content="dark" />
    <meta name="x-ogp-key" content="YOUR_CREATOR_ID" id="ogp-key-meta" />

    <title>The Penis Game</title>
    <meta name="description" content="Scream PENIS as loud as you can. You have 6.9 seconds. Beat the leaderboard." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://penis.game" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Penis Game" />
    <meta property="og:description" content="Scream PENIS as loud as you can. You have 6.9 seconds." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="The Penis Game" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Penis Game" />
    <meta name="twitter:description" content="Scream PENIS as loud as you can. You have 6.9 seconds." />
    <meta name="twitter:image" content="/og.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Penis Game" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Font preloads — load stylesheet properly + preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@200;300;400;500;600&display=swap" />

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://sdk.play.fun" />

    <style>
      /* Critical CSS — prevent FOUC */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0e18; overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      #root { min-height: 100vh; min-height: 100dvh; }

      /* Reduced motion — respect user preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Prevent text size adjust on orientation change */
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

      /* Remove tap highlight on mobile */
      * { -webkit-tap-highlight-color: transparent; }

      /* Smooth scrolling only when no motion preference */
      @media (prefers-reduced-motion: no-preference) {
        html { scroll-behavior: smooth; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://sdk.play.fun" defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
